<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión</title>
 <link rel="stylesheet" href="estilos2.css">
</head>
<body>
  <!-- Contenedor del formulario -->
  <div class="login-box">
    <h2>Iniciar Sesión</h2>
     <form onsubmit="return validarLogin()" id="formularioLogin">
            <!-- AHORA PIDE USUARIO OTRA VEZ -->
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" required />
            
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" required />
            
            <input type="submit" value="Entrar" />
            <p id="error" style="display:none; color:red; margin-top:10px; text-align:center;"></p>
        </form>
        
        <div class="extra">
            <p><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p>
            <p><a href="crear-cuenta.html">Crear cuenta nueva</a></p>
        </div>
    </div>

<script>
function validarLogin(){
  let usuarioInput = document.getElementById('usuario').value;
  let passInput = document.getElementById('contrasena').value;
  
  let usuarioGuardado = localStorage.getItem('user');
  let passGuardada = localStorage.getItem('pass');
  
  if(!usuarioGuardado){
    document.getElementById('error').innerText = "No hay cuentas registradas. Crea una primero";
    document.getElementById('error').style.display = "block";
    return false;
  }
  
  // AHORA COMPARA CON EL USUARIO
  if(usuarioInput === usuarioGuardado && passInput === passGuardada){
    window.location.href = "index.html"; // Cambia esto por tu página principal
  } else {
    document.getElementById('error').innerText = "Usuario o contraseña incorrectos";
    document.getElementById('error').style.display = "block";
  }
  
  return false;
}
</script>
</body>
</html>
